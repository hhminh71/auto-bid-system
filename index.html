<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống AutoBid - Tự động hóa Hồ sơ Đấu thầu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (Biên dịch JSX trực tiếp trên trình duyệt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- THƯ VIỆN XỬ LÝ WORD VÀ TẢI FILE (ĐÃ CẬP NHẬT NGUỒN ỔN ĐỊNH) -->
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.11/build/docxtemplater.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            const [formData, setFormData] = React.useState({
                tenDuAn: '',
                chuDauTu: '',
                tongMucDauTu: '',
                tenGoiThau: '',
                hinhThucLCNT: 'Chỉ định thầu rút gọn',
                loaiHopDong: 'Trọn gói'
            });

            const [isGenerating, setIsGenerating] = React.useState(false);

            const logicTree = {
                'Chỉ định thầu rút gọn': [
                    { id: 'tt1', name: '01. Tờ trình phê duyệt KHLCNT' }
                ],
                'Đấu thầu rộng rãi': [
                    { id: 'tt1', name: '01. Tờ trình phê duyệt KHLCNT' },
                    { id: 'qd1', name: '02. Quyết định phê duyệt KHLCNT' }
                ]
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({
                    ...formData,
                    [name]: value
                });
            };

            // HÀM LÕI: Đọc file Word mẫu và trộn dữ liệu
            const generateDocument = async () => {
                if (!formData.tenDuAn || !formData.tenGoiThau) {
                    alert("Vui lòng nhập Tên dự án và Tên gói thầu trước khi xuất file!");
                    return;
                }

                setIsGenerating(true);

                try {
                    // Kiểm tra xem thư viện đã tải xong chưa (Tránh lỗi PizZip is not defined)
                    if (typeof window.PizZip === 'undefined') {
                        throw new Error("Thư viện lõi (PizZip) chưa tải xong do kết nối mạng. Vui lòng tải lại trang (bấm F5) và thử lại!");
                    }
                    if (typeof window.docxtemplater === 'undefined') {
                        throw new Error("Thư viện lõi (docxtemplater) chưa tải xong. Vui lòng tải lại trang (bấm F5) và thử lại!");
                    }

                    // 1. Tải file template.docx từ máy chủ (kho GitHub của bạn)
                    const response = await fetch('./template.docx');
                    
                    if (!response.ok) {
                        throw new Error("Không tìm thấy file template.docx trên hệ thống. Đảm bảo bạn đã tải file template.docx lên GitHub và chờ Cloudflare cập nhật.");
                    }
                    
                    const arrayBuffer = await response.arrayBuffer();

                    // 2. Mở file Word (dạng nén zip) - Gọi đích danh từ window
                    const zip = new window.PizZip(arrayBuffer);

                    // 3. Khởi tạo docxtemplater
                    const doc = new window.docxtemplater(zip, {
                        paragraphLoop: true,
                        linebreaks: true,
                    });

                    // 4. Nhồi dữ liệu từ Form vào file Word
                    doc.render({
                        tenDuAn: formData.tenDuAn,
                        chuDauTu: formData.chuDauTu,
                        tongMucDauTu: formData.tongMucDauTu,
                        tenGoiThau: formData.tenGoiThau,
                        hinhThucLCNT: formData.hinhThucLCNT,
                        loaiHopDong: formData.loaiHopDong
                    });

                    // 5. Đóng gói lại thành file Word mới
                    const out = doc.getZip().generate({
                        type: "blob",
                        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    });

                    // 6. Tải xuống máy tính người dùng
                    saveAs(out, `Ho_So_${formData.tenGoiThau.replace(/\s+/g, '_')}.docx`);
                    
                } catch (error) {
                    console.error("Lỗi tạo file:", error);
                    alert("Có lỗi xảy ra: " + error.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const currentDocs = logicTree[formData.hinhThucLCNT] || logicTree['Chỉ định thầu rút gọn'];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 border-b pb-4 border-slate-200">
                            <h1 className="text-3xl font-bold text-blue-900 tracking-tight">Hệ thống AutoBid</h1>
                            <p className="text-slate-500 mt-1">Tự động hóa Hồ sơ Đấu thầu - Chạy trên Cloudflare</p>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-6">
                                {/* Box 1: Thông tin Dự án */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h2 className="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                                        <span className="bg-blue-100 text-blue-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">1</span>
                                        Thông tin chung Dự án
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tên Dự án <span className="text-red-500">*</span></label>
                                            <input type="text" name="tenDuAn" value={formData.tenDuAn} onChange={handleInputChange} placeholder="VD: Xây dựng trường mầm non A" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Chủ đầu tư</label>
                                            <input type="text" name="chuDauTu" value={formData.chuDauTu} onChange={handleInputChange} placeholder="VD: UBND Huyện B" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tổng mức đầu tư</label>
                                            <input type="text" name="tongMucDauTu" value={formData.tongMucDauTu} onChange={handleInputChange} placeholder="VD: 15.000.000.000" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                    </div>
                                </div>

                                {/* Box 2: Chi tiết Gói thầu */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h2 className="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                                        <span className="bg-emerald-100 text-emerald-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">2</span>
                                        Chi tiết Gói thầu
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tên Gói thầu <span className="text-red-500">*</span></label>
                                            <input type="text" name="tenGoiThau" value={formData.tenGoiThau} onChange={handleInputChange} placeholder="VD: Thi công xây lắp hạng mục chính" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Hình thức LCNT</label>
                                            <select name="hinhThucLCNT" value={formData.hinhThucLCNT} onChange={handleInputChange} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none bg-white">
                                                {Object.keys(logicTree).map(key => (
                                                    <option key={key} value={key}>{key}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Loại Hợp đồng</label>
                                            <select name="loaiHopDong" value={formData.loaiHopDong} onChange={handleInputChange} className="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white">
                                                <option value="Trọn gói">Trọn gói</option>
                                                <option value="Theo đơn giá cố định">Theo đơn giá cố định</option>
                                                <option value="Theo đơn giá điều chỉnh">Theo đơn giá điều chỉnh</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Cột phải: Xuất file */}
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-blue-50 p-6 rounded-xl border border-blue-100">
                                    <h3 className="font-bold text-blue-900 mb-2">Trộn thư & Xuất file</h3>
                                    <p className="text-sm text-blue-700 mb-4">Hệ thống sẽ lấy dữ liệu bạn vừa nhập ghép vào file <strong>template.docx</strong> có trên máy chủ.</p>
                                    
                                    <button 
                                        onClick={generateDocument}
                                        disabled={isGenerating}
                                        className={`w-full text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors flex justify-center items-center ${isGenerating ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                                    >
                                        {isGenerating ? 'Đang tạo file...' : 'Tạo File Word Tự Động'}
                                    </button>
                                </div>
                                <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-sm text-amber-800">
                                    <strong>💡 Lưu ý quan trọng:</strong> Để chức năng này hoạt động, bạn phải đảm bảo đã tải file có tên <code>template.docx</code> lên cùng kho GitHub chứa file này!
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
