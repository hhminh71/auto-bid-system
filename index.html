<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống AutoBid - Tự động hóa Hồ sơ Đấu thầu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (Biên dịch JSX trực tiếp trên trình duyệt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- THƯ VIỆN XỬ LÝ WORD VÀ TẢI FILE -->
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.11/build/docxtemplater.js"></script>
    <!-- THƯ VIỆN MỚI: DÙNG ĐỂ NÉN NHIỀU FILE THÀNH 1 FILE .ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // --- HÀM HỖ TRỢ: ĐỌC SỐ TIỀN THÀNH CHỮ TIẾNG VIỆT ---
        const docTien = (so) => {
            if (!so) return '';
            let str = parseInt(so.replace(/\D/g, '')).toString();
            if (str === 'NaN' || str === '0') return 'Không đồng';
            
            const chuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
            const tien = ["", "nghìn", "triệu", "tỷ", "nghìn tỷ", "triệu tỷ"];
            let count = 0;
            let result = "";
            let rs = "";
            
            while (str.length > 0) {
                let len = str.length;
                let soPhanGhi = str.substring(Math.max(0, len - 3), len);
                str = str.substring(0, Math.max(0, len - 3));
                let num = parseInt(soPhanGhi);
                
                if (num > 0) {
                    let tram = Math.floor(num / 100);
                    let chuc = Math.floor((num % 100) / 10);
                    let donVi = num % 10;
                    rs = "";
                    
                    if (str.length > 0 || tram > 0) { 
                        rs += chuSo[tram] + " trăm ";
                        if (chuc === 0 && donVi > 0) rs += "lẻ ";
                    }
                    if (chuc === 1) rs += "mười ";
                    else if (chuc > 1) rs += chuSo[chuc] + " mươi ";
                    
                    if (donVi === 1 && chuc > 1) rs += "mốt ";
                    else if (donVi === 5 && chuc > 0) rs += "lăm ";
                    else if (donVi > 0) rs += chuSo[donVi] + " ";
                    
                    result = rs.trim() + " " + tien[count] + " " + result;
                } else if (count === 3 && result.trim() !== "") { 
                    result = tien[count] + " " + result;
                }
                count++;
            }
            result = result.replace(/\s+/g, ' ').trim();
            return result.charAt(0).toUpperCase() + result.slice(1) + " đồng chẵn";
        };

        // --- HÀM HỖ TRỢ 2: XỬ LÝ NGÀY THÁNG ĐỊNH DẠNG VIỆT NAM ---
        const formatNgay = (dateStr, type = 'full') => {
            if (!dateStr) return '...'; 
            const [year, month, day] = dateStr.split('-');
            
            if (type === 'full') return `ngày ${day} tháng ${month} năm ${year}`;
            if (type === 'short') return `${day}/${month}/${year}`;
            if (type === 'd') return day;
            if (type === 'm') return month;
            if (type === 'y') return year;
            return dateStr;
        };

        const App = () => {
            // BƯỚC 1: KHAI BÁO BIẾN
            const [formData, setFormData] = React.useState({
                tenDuAn: '',
                chuDauTu: '',
                nguonVon: '', 
                tongMucDauTu: '',
                soQuyetDinhDA: '',
                tenGoiThau: '',
                hinhThucLCNT: 'Chỉ định thầu rút gọn', 
                buocLCNT: 'Bước chuẩn bị', // Biến mới quản lý Bước
                loaiHopDong: 'Trọn gói',
                thoiGianThucHien: '', 
                tenNhaThau: '', 
                phuongThucLCNT: 'Một giai đoạn một túi hồ sơ', 
                soTienDamBaoDuThau: '', 
                soToTrinh: '',
                ngayToTrinh: '',
                soQuyetDinh: '',
                ngayQuyetDinh: ''
            });

            const [isGenerating, setIsGenerating] = React.useState(false);
            const fileInputRef = React.useRef(null);

            // MA TRẬN LOGIC (HÌNH THỨC x BƯỚC)
            const logicTree = {
                'Dưới 50 triệu': {
                    'Bước chuẩn bị': [{ id: 'd50_1', name: '01. Quyết định mua sắm', filename: '01_QD_MuaSam.docx' }],
                    'Bước thực hiện': [
                        { id: 'd50_2', name: '02. Biên bản nghiệm thu', filename: '02_BB_NghiemThu.docx' },
                        { id: 'd50_3', name: '03. Thanh lý hợp đồng', filename: '03_ThanhLy.docx' },
                        { id: 'd50_4', name: '04. Hợp đồng mua bán', filename: '04_HopDongMuaBan.docx' }
                    ]
                },
                'Chào giá hạn chế': {
                    'Bước chuẩn bị': [{ id: 'cghc_1', name: '01. Tờ trình phê duyệt KHLCNT', filename: '01_ToTrinh_KHLCNT.docx' }],
                    'Bước thực hiện': [
                        { id: 'cghc_2', name: '02. Báo cáo đánh giá báo giá', filename: '02_BaoCaoDanhGia.docx' },
                        { id: 'cghc_3', name: '03. Quyết định phê duyệt KQ LCNT', filename: '03_QD_KQLCNT.docx' },
                        { id: 'cghc_4', name: '04. Hợp đồng', filename: '04_HopDong.docx' }
                    ]
                },
                'Chào giá rộng rãi': {
                    'Bước chuẩn bị': [{ id: 'cgrr_1', name: '01. Tờ trình phê duyệt KHLCNT', filename: '01_ToTrinh_KHLCNT.docx' }],
                    'Bước thực hiện': [
                        { id: 'cgrr_2', name: '02. Báo cáo đánh giá E-HSQT', filename: '02_BaoCaoDanhGia.docx' },
                        { id: 'cgrr_3', name: '03. Quyết định phê duyệt KQ', filename: '03_QD_KQLCNT.docx' },
                        { id: 'cgrr_4', name: '04. Hợp đồng', filename: '04_HopDong.docx' }
                    ]
                },
                'Chỉ định thầu rút gọn': {
                    'Bước chuẩn bị': [
                        { id: 'cdtrg_1', name: '01. Tờ trình phê duyệt KHLCNT', filename: '01_ToTrinh_KHLCNT.docx' },
                        { id: 'cdtrg_2', name: '02. Quyết định phê duyệt KHLCNT', filename: '02_QuyetDinh_KHLCNT.docx' }
                    ],
                    'Bước thực hiện': [
                        { id: 'cdtrg_3', name: '03. Biên bản thương thảo', filename: '03_BBThuongThao.docx' },
                        { id: 'cdtrg_4', name: '04. Quyết định phê duyệt KQ', filename: '04_QD_KQLCNT.docx' },
                        { id: 'cdtrg_5', name: '05. Hợp đồng kinh tế', filename: '05_HopDong.docx' }
                    ]
                },
                'Đấu thầu rộng rãi': {
                    'Bước chuẩn bị': [
                        { id: 'dtrr_1', name: '01. Tờ trình phê duyệt KHLCNT', filename: '01_ToTrinh_KHLCNT.docx' },
                        { id: 'dtrr_2', name: '02. Quyết định phê duyệt KHLCNT', filename: '02_QuyetDinh_KHLCNT.docx' },
                        { id: 'dtrr_3', name: '03. Quyết định lập Tổ chuyên gia', filename: '03_LapToChuyenGia.docx' }
                    ],
                    'Bước thực hiện': [
                        { id: 'dtrr_4', name: '04. Báo cáo đánh giá E-HSDT', filename: '04_BCDanhGia.docx' },
                        { id: 'dtrr_5', name: '05. Quyết định phê duyệt KQ', filename: '05_QD_KQLCNT.docx' },
                        { id: 'dtrr_6', name: '06. Thông báo trúng thầu', filename: '06_ThongBaoTrungThau.docx' },
                        { id: 'dtrr_7', name: '07. Hợp đồng kinh tế', filename: '07_HopDong.docx' }
                    ]
                }
            };

            const cacBuocList = ['Bước chuẩn bị', 'Bước thực hiện'];

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({
                    ...formData,
                    [name]: value
                });
            };

            const handleNumberChange = (e) => {
                const { name, value } = e.target;
                let rawValue = value.replace(/\D/g, ''); 
                let formattedValue = rawValue.replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
                setFormData({
                    ...formData,
                    [name]: formattedValue
                });
            };

            const handleExportData = () => {
                const dataStr = JSON.stringify(formData, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const fileName = formData.tenGoiThau ? `DuLieu_${formData.tenGoiThau.replace(/\s+/g, '_')}.json` : 'DuLieu_ChuaDatTen.json';
                saveAs(blob, fileName);
            };

            const handleImportData = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        setFormData({ ...formData, ...importedData });
                        alert("Đã nhập dữ liệu thành công!");
                    } catch (err) {
                        alert("Lỗi! File không đúng định dạng. Vui lòng chọn file .json bạn đã lưu trước đó.");
                    }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            const generateDocument = async () => {
                if (!formData.tenDuAn || !formData.tenGoiThau) {
                    alert("Vui lòng nhập Tên dự án và Tên gói thầu trước khi xuất file!");
                    return;
                }

                setIsGenerating(true);

                try {
                    if (typeof window.JSZip === 'undefined') {
                        throw new Error("Thư viện JSZip chưa tải xong. Vui lòng F5 tải lại trang.");
                    }

                    // Lấy ra danh sách cụm biểu mẫu dựa vào Hình thức và Bước đang chọn
                    const currentFormLogic = logicTree[formData.hinhThucLCNT] || logicTree['Chỉ định thầu rút gọn'];
                    const currentDocsToGen = currentFormLogic[formData.buocLCNT] || [];
                    
                    if (currentDocsToGen.length === 0) {
                        throw new Error(`Chưa có biểu mẫu nào được cấu hình cho phần ${formData.hinhThucLCNT} - ${formData.buocLCNT}.`);
                    }

                    const zipArchive = new window.JSZip();
                    let successCount = 0;
                    
                    for (const docInfo of currentDocsToGen) {
                        try {
                            const response = await fetch('./' + docInfo.filename);
                            if (!response.ok) {
                                console.warn(`Bỏ qua ${docInfo.filename} vì không tìm thấy trên server.`);
                                continue; 
                            }
                            const arrayBuffer = await response.arrayBuffer();
                            const zip = new window.PizZip(arrayBuffer);
                            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                            // TÍNH TOÁN CÁC BIẾN PHÁI SINH
                            const dataToRender = {
                                ...formData,
                                tongMucDauTuBangChu: docTien(formData.tongMucDauTu),
                                soTienDamBaoDuThauBangChu: docTien(formData.soTienDamBaoDuThau), 
                                
                                ngayToTrinhFull: formatNgay(formData.ngayToTrinh, 'full'),
                                ngayToTrinhShort: formatNgay(formData.ngayToTrinh, 'short'),
                                ngayToTrinh_d: formatNgay(formData.ngayToTrinh, 'd'),
                                ngayToTrinh_m: formatNgay(formData.ngayToTrinh, 'm'),
                                ngayToTrinh_y: formatNgay(formData.ngayToTrinh, 'y'),

                                ngayQuyetDinhFull: formatNgay(formData.ngayQuyetDinh, 'full'),
                                ngayQuyetDinhShort: formatNgay(formData.ngayQuyetDinh, 'short'),
                                ngayQuyetDinh_d: formatNgay(formData.ngayQuyetDinh, 'd'),
                                ngayQuyetDinh_m: formatNgay(formData.ngayQuyetDinh, 'm'),
                                ngayQuyetDinh_y: formatNgay(formData.ngayQuyetDinh, 'y')
                            };

                            doc.render(dataToRender); 

                            const docBlob = doc.getZip().generate({
                                type: "blob",
                                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                            });

                            zipArchive.file(`${docInfo.name}.docx`, docBlob);
                            successCount++;

                        } catch (err) {
                            console.error(`Lỗi khi xử lý file ${docInfo.filename}:`, err);
                        }
                    }

                    if (successCount === 0) {
                        throw new Error("Không thể tạo được file nào. Vui lòng kiểm tra lại xem bạn đã tải các file Word mẫu lên GitHub chưa?");
                    }

                    const content = await zipArchive.generateAsync({ type: "blob" });
                    saveAs(content, `Ho_So_${formData.tenGoiThau.replace(/\s+/g, '_')}_${formData.buocLCNT.replace(/\s+/g, '')}.zip`);
                    
                } catch (error) {
                    console.error("Lỗi tạo file ZIP:", error);
                    alert("Có lỗi xảy ra: " + error.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Xác định danh sách file hiển thị ở giao diện
            const currentFormLogic = logicTree[formData.hinhThucLCNT] || logicTree['Chỉ định thầu rút gọn'];
            const currentDocs = currentFormLogic[formData.buocLCNT] || [];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-6 border-b pb-4 border-slate-200 flex flex-col md:flex-row md:items-end md:justify-between gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-blue-900 tracking-tight">Hệ thống AutoBid PRO</h1>
                                <p className="text-slate-500 mt-1">Tự động hóa trộn đa biểu mẫu & Đóng gói ZIP</p>
                            </div>
                            
                            <div className="flex space-x-3">
                                <input 
                                    type="file" 
                                    accept=".json" 
                                    ref={fileInputRef} 
                                    onChange={handleImportData} 
                                    className="hidden" 
                                />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="bg-white border border-slate-300 text-slate-700 hover:bg-blue-50 hover:text-blue-700 hover:border-blue-300 font-medium py-2 px-4 rounded-lg shadow-sm flex items-center transition-all text-sm"
                                >
                                    <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                    Nhập dữ liệu
                                </button>
                                <button 
                                    onClick={handleExportData}
                                    className="bg-white border border-slate-300 text-slate-700 hover:bg-blue-50 hover:text-blue-700 hover:border-blue-300 font-medium py-2 px-4 rounded-lg shadow-sm flex items-center transition-all text-sm"
                                >
                                    <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4 4l-4-4m0 0l-4-4m4 4V4"></path></svg>
                                    Lưu dữ liệu
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-6">
                                
                                {/* BOX 1: CẤU HÌNH QUY TRÌNH MA TRẬN */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-t-4 border-t-blue-500">
                                    <h2 className="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                                        <span className="bg-blue-100 text-blue-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">1</span>
                                        Cấu hình
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">1.1. Hình thức LCNT <span className="text-red-500">*</span></label>
                                            <select name="hinhThucLCNT" value={formData.hinhThucLCNT} onChange={handleInputChange} className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none bg-blue-50 font-bold text-blue-900 shadow-sm cursor-pointer transition-colors">
                                                {Object.keys(logicTree).map(key => (
                                                    <option key={key} value={key}>{key}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">1.2. Bước thực hiện <span className="text-red-500">*</span></label>
                                            <select name="buocLCNT" value={formData.buocLCNT} onChange={handleInputChange} className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none bg-blue-50 font-bold text-blue-900 shadow-sm cursor-pointer transition-colors">
                                                {cacBuocList.map(step => (
                                                    <option key={step} value={step}>{step}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div className="col-span-1 md:col-span-2">
                                            <p className="text-xs text-slate-500 italic">Thay đổi tùy chọn "Hình thức" và "Bước" sẽ tự động quyết định các cụm hồ sơ được xuất ra ở khung Đóng gói.</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Box 2: Thông tin Dự án */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h2 className="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                                        <span className="bg-indigo-100 text-indigo-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">2</span>
                                        Thông tin chung Dự án
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tên Dự án <span className="text-red-500">*</span></label>
                                            <input type="text" name="tenDuAn" value={formData.tenDuAn} onChange={handleInputChange} placeholder="VD: Xây dựng trường mầm non A" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Chủ đầu tư</label>
                                            <input type="text" name="chuDauTu" value={formData.chuDauTu} onChange={handleInputChange} placeholder="VD: UBND Huyện B" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Nguồn vốn</label>
                                            <input type="text" name="nguonVon" value={formData.nguonVon} onChange={handleInputChange} placeholder="VD: Ngân sách nhà nước" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Số QĐ Phê duyệt Dự án</label>
                                            <input type="text" name="soQuyetDinhDA" value={formData.soQuyetDinhDA} onChange={handleInputChange} placeholder="VD: 123/QĐ-UBND" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                    </div>
                                </div>

                                {/* Box 3: Chi tiết Gói thầu */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h2 className="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                                        <span className="bg-emerald-100 text-emerald-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">3</span>
                                        Chi tiết Gói thầu
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tên Gói thầu <span className="text-red-500">*</span></label>
                                            <input type="text" name="tenGoiThau" value={formData.tenGoiThau} onChange={handleInputChange} placeholder="VD: Thi công xây lắp hạng mục chính" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Loại Hợp đồng</label>
                                            <select name="loaiHopDong" value={formData.loaiHopDong} onChange={handleInputChange} className="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white">
                                                <option value="Trọn gói">Trọn gói</option>
                                                <option value="Theo đơn giá cố định">Theo đơn giá cố định</option>
                                                <option value="Theo đơn giá điều chỉnh">Theo đơn giá điều chỉnh</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Thời gian thực hiện (ngày)</label>
                                            <input type="text" name="thoiGianThucHien" value={formData.thoiGianThucHien} onChange={handleInputChange} placeholder="VD: 120" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>

                                        <div className="col-span-1 md:col-span-2 border-t border-slate-100 mt-2 pt-4">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tổng mức đầu tư (Giá trị gói thầu) - VNĐ</label>
                                            <input type="text" name="tongMucDauTu" value={formData.tongMucDauTu} onChange={handleNumberChange} placeholder="VD: 15.000.000.000" className="w-full px-4 py-2 font-semibold text-blue-900 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                            {formData.tongMucDauTu && (
                                                <p className="text-sm text-blue-700 mt-2 italic bg-blue-50 p-2 rounded">
                                                    <strong>Bằng chữ:</strong> {docTien(formData.tongMucDauTu)}
                                                </p>
                                            )}
                                        </div>

                                        {/* TÙY BIẾN 1: Tên nhà thầu áp dụng cho các hình thức hạn chế */}
                                        {['Chỉ định thầu rút gọn', 'Dưới 50 triệu', 'Chào giá hạn chế'].includes(formData.hinhThucLCNT) && (
                                            <div className="col-span-1 md:col-span-2 bg-green-50 p-4 rounded-lg border border-green-200 mt-2">
                                                <h3 className="text-sm font-bold text-green-800 mb-2">✦ Thông tin dành riêng cho Nhà thầu</h3>
                                                <label className="block text-sm font-medium text-slate-700 mb-1">Tên Nhà thầu chỉ định (hoặc dự kiến)</label>
                                                <input type="text" name="tenNhaThau" value={formData.tenNhaThau} onChange={handleInputChange} placeholder="VD: Công ty Cổ phần Xây dựng XYZ" className="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:green-500 outline-none" />
                                            </div>
                                        )}

                                        {/* TÙY BIẾN 2: Phương thức LCNT cho các hình thức mở rộng */}
                                        {['Đấu thầu rộng rãi', 'Chào giá rộng rãi'].includes(formData.hinhThucLCNT) && (
                                            <div className="col-span-1 md:col-span-2 bg-amber-50 p-4 rounded-lg border border-amber-200 mt-2">
                                                <h3 className="text-sm font-bold text-amber-800 mb-3">✦ Thông tin dành riêng cho Đấu thầu</h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-sm font-medium text-slate-700 mb-1">Phương thức LCNT</label>
                                                        <select name="phuongThucLCNT" value={formData.phuongThucLCNT} onChange={handleInputChange} className="w-full px-4 py-2 border border-amber-300 rounded-lg bg-white outline-none">
                                                            <option value="Một giai đoạn một túi hồ sơ">Một giai đoạn một túi hồ sơ</option>
                                                            <option value="Một giai đoạn hai túi hồ sơ">Một giai đoạn hai túi hồ sơ</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-medium text-slate-700 mb-1">Giá trị Bảo đảm dự thầu (VNĐ)</label>
                                                        <input type="text" name="soTienDamBaoDuThau" value={formData.soTienDamBaoDuThau} onChange={handleNumberChange} placeholder="VD: 15.000.000" className="w-full px-4 py-2 border border-amber-300 rounded-lg focus:ring-2 focus:amber-500 outline-none" />
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                </div>

                                {/* Box 4: Thông tin Văn bản (Căn cứ) */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h2 className="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                                        <span className="bg-purple-100 text-purple-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">4</span>
                                        Thông tin Văn bản liên quan (Căn cứ)
                                    </h2>
                                    <p className="text-sm text-slate-500 mb-4">Nhập các thông tin này để làm "Căn cứ pháp lý" cho các văn bản sinh ra phía sau.</p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Số Tờ trình KHLCNT</label>
                                            <input type="text" name="soToTrinh" value={formData.soToTrinh} onChange={handleInputChange} placeholder="VD: 15/TTr-BQL" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Ngày Tờ trình</label>
                                            <input type="date" name="ngayToTrinh" value={formData.ngayToTrinh} onChange={handleInputChange} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none text-slate-700" />
                                        </div>

                                        <div className="mt-2 md:mt-0 border-t md:border-t-0 border-slate-100 pt-2 md:pt-0">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Số QĐ phê duyệt KHLCNT</label>
                                            <input type="text" name="soQuyetDinh" value={formData.soQuyetDinh} onChange={handleInputChange} placeholder="VD: 128/QĐ-UBND" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div className="mt-2 md:mt-0 border-t md:border-t-0 border-slate-100 pt-2 md:pt-0">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Ngày Quyết định</label>
                                            <input type="date" name="ngayQuyetDinh" value={formData.ngayQuyetDinh} onChange={handleInputChange} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none text-slate-700" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Cột phải: Xuất file */}
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-blue-50 p-6 rounded-xl border border-blue-100 sticky top-4">
                                    <h3 className="font-bold text-blue-900 mb-2">Đóng gói Hồ sơ</h3>
                                    <p className="text-sm text-blue-700 mb-4">
                                        Hệ thống sẽ trộn dữ liệu vào <strong>{currentDocs.length} biểu mẫu</strong> 
                                        <br/>(của hình thức <span className="font-semibold underline">{formData.hinhThucLCNT}</span> - <span className="font-semibold">{formData.buocLCNT}</span>) và nén thành 1 file .ZIP.
                                    </p>
                                    
                                    {currentDocs.length > 0 ? (
                                        <ul className="text-xs text-blue-800 mb-6 space-y-1">
                                            {currentDocs.map(doc => (
                                                <li key={doc.id}>✓ {doc.name}</li>
                                            ))}
                                        </ul>
                                    ) : (
                                        <div className="text-xs text-red-600 bg-red-50 p-2 rounded mb-6 border border-red-200">
                                            ⚠️ Chưa có biểu mẫu nào được cấu hình cho Bước này. Bạn vui lòng bổ sung vào biến logicTree trong mã nguồn.
                                        </div>
                                    )}

                                    <button 
                                        onClick={generateDocument}
                                        disabled={isGenerating || currentDocs.length === 0}
                                        className={`w-full text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors flex justify-center items-center ${(isGenerating || currentDocs.length === 0) ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                                    >
                                        {isGenerating ? 'Đang tạo & nén ZIP...' : `Xuất File .ZIP Hồ Sơ`}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
