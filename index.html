<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Quản lý Hồ sơ Đấu thầu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React + ReactDOM CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel để dùng JSX trong trình duyệt -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const HINH_THUC_OPTIONS = [
      "Đấu thầu rộng rãi",
      "Chỉ định thầu",
      "Chào hàng cạnh tranh",
      "Mua sắm trực tiếp",
    ];

    const MAU_THEO_HINH_THUC = {
      "Đấu thầu rộng rãi": [
        "Thông báo mời thầu",
        "Hồ sơ mời thầu",
        "Biên bản mở thầu",
        "Báo cáo đánh giá HSDT",
        "Quyết định phê duyệt kết quả lựa chọn nhà thầu",
      ],
      "Chỉ định thầu": [
        "Tờ trình phê duyệt chỉ định thầu",
        "Quyết định phê duyệt hình thức chỉ định thầu",
        "Dự thảo Hợp đồng chỉ định thầu",
      ],
      "Chào hàng cạnh tranh": [
        "Yêu cầu chào hàng",
        "Biên bản mở chào hàng",
        "Báo cáo đánh giá chào hàng",
      ],
      "Mua sắm trực tiếp": [
        "Tờ trình mua sắm trực tiếp",
        "Báo giá của nhà cung cấp",
        "Báo cáo kết quả mua sắm trực tiếp",
      ],
    };

    function App() {
      const [formData, setFormData] = useState({
        tenDuAn: "",
        chuDauTu: "",
        tenGoiThau: "",
        hinhThuc: "",
      });

      const handleChange = (field) => (e) => {
        setFormData((prev) => ({ ...prev, [field]: e.target.value }));
      };

      const mauHienThi =
        formData.hinhThuc && MAU_THEO_HINH_THUC[formData.hinhThuc]
          ? MAU_THEO_HINH_THUC[formData.hinhThuc]
          : [];

      return (
        <div className="max-w-6xl mx-auto py-10 px-4">
          {/* Tiêu đề */}
          <header className="mb-8">
            <h1 className="text-3xl font-bold text-slate-800">
              Quản lý Hồ sơ Đấu thầu
            </h1>
            <p className="text-slate-500 mt-2">
              Nhập thông tin gói thầu và chọn hình thức LCNT để xem danh sách biểu mẫu tương ứng.
            </p>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
            {/* Form thông tin gói thầu */}
            <section className="bg-white shadow-sm rounded-xl p-6 border border-slate-100">
              <h2 className="text-lg font-semibold text-slate-800 mb-4">
                Thông tin gói thầu
              </h2>

              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">
                    Tên dự án
                  </label>
                  <input
                    type="text"
                    value={formData.tenDuAn}
                    onChange={handleChange("tenDuAn")}
                    className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"
                    placeholder="Ví dụ: Dự án xây dựng Trụ sở UBND..."
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">
                    Chủ đầu tư
                  </label>
                  <input
                    type="text"
                    value={formData.chuDauTu}
                    onChange={handleChange("chuDauTu")}
                    className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"
                    placeholder="Nhập tên chủ đầu tư"
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">
                    Tên gói thầu
                  </label>
                  <input
                    type="text"
                    value={formData.tenGoiThau}
                    onChange={handleChange("tenGoiThau")}
                    className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"
                    placeholder="Ví dụ: Gói thầu xây lắp số 01..."
                  />
                </div>

                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">
                    Hình thức LCNT
                  </label>
                  <select
                    value={formData.hinhThuc}
                    onChange={handleChange("hinhThuc")}
                    className="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500"
                  >
                    <option value="">-- Chọn hình thức LCNT --</option>
                    {HINH_THUC_OPTIONS.map((opt) => (
                      <option key={opt} value={opt}>
                        {opt}
                      </option>
                    ))}
                  </select>
                </div>
              </div>
            </section>

            {/* Danh sách biểu mẫu */}
            <section className="bg-white shadow-sm rounded-xl p-6 border border-slate-100">
              <h2 className="text-lg font-semibold text-slate-800 mb-4">
                Biểu mẫu tương ứng
              </h2>

              {!formData.hinhThuc ? (
                <div className="h-full flex items-center justify-center text-center text-slate-400 text-sm border border-dashed border-slate-200 rounded-lg p-6">
                  Chọn hình thức LCNT bên trái để hiển thị danh sách biểu mẫu cần chuẩn bị.
                </div>
              ) : mauHienThi.length === 0 ? (
                <div className="text-sm text-slate-500">
                  Chưa cấu hình biểu mẫu cho hình thức:{" "}
                  <span className="font-semibold text-slate-700">
                    {formData.hinhThuc}
                  </span>
                </div>
              ) : (
                <>
                  <p className="text-sm text-slate-500 mb-3">
                    Hình thức:{" "}
                    <span className="font-semibold text-slate-700">
                      {formData.hinhThuc}
                    </span>
                  </p>
                  <ul className="space-y-2">
                    {mauHienThi.map((mau, idx) => (
                      <li
                        key={idx}
                        className="flex items-start gap-2 rounded-lg border border-slate-200 bg-slate-50 px-3 py-2 text-sm"
                      >
                        <span className="mt-0.5 inline-flex h-5 w-5 items-center justify-center rounded-full bg-sky-100 text-xs font-semibold text-sky-700">
                          {idx + 1}
                        </span>
                        <span className="text-slate-700">{mau}</span>
                      </li>
                    ))}
                  </ul>
                </>
              )}
            </section>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
