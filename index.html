<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống AutoDocs - Cảng HKQT Cần Thơ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (Biên dịch JSX trực tiếp trên trình duyệt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- THƯ VIỆN XỬ LÝ WORD VÀ TẢI FILE -->
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.11/build/docxtemplater.js"></script>
    <!-- THƯ VIỆN NÉN FILE ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <!-- GỌI FILE CẤU HÌNH BÊN NGOÀI VÀO -->
    <script src="./config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // --- HÀM HỖ TRỢ: ĐỌC SỐ TIỀN THÀNH CHỮ ---
        const docTien = (so) => {
            if (!so) return '';
            let str = parseInt(so.replace(/\D/g, '')).toString();
            if (str === 'NaN' || str === '0') return 'Không đồng';
            
            const chuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
            const tien = ["", "nghìn", "triệu", "tỷ", "nghìn tỷ", "triệu tỷ"];
            let count = 0;
            let result = "";
            let rs = "";
            
            while (str.length > 0) {
                let len = str.length;
                let soPhanGhi = str.substring(Math.max(0, len - 3), len);
                str = str.substring(0, Math.max(0, len - 3));
                let num = parseInt(soPhanGhi);
                
                if (num > 0) {
                    let tram = Math.floor(num / 100);
                    let chuc = Math.floor((num % 100) / 10);
                    let donVi = num % 10;
                    rs = "";
                    
                    if (str.length > 0 || tram > 0) { 
                        rs += chuSo[tram] + " trăm ";
                        if (chuc === 0 && donVi > 0) rs += "lẻ ";
                    }
                    if (chuc === 1) rs += "mười ";
                    else if (chuc > 1) rs += chuSo[chuc] + " mươi ";
                    
                    if (donVi === 1 && chuc > 1) rs += "mốt ";
                    else if (donVi === 5 && chuc > 0) rs += "lăm ";
                    else if (donVi > 0) rs += chuSo[donVi] + " ";
                    
                    result = rs.trim() + " " + tien[count] + " " + result;
                } else if (count === 3 && result.trim() !== "") { 
                    result = tien[count] + " " + result;
                }
                count++;
            }
            result = result.replace(/\s+/g, ' ').trim();
            return result.charAt(0).toUpperCase() + result.slice(1) + " đồng chẵn";
        };

        // --- HÀM HỖ TRỢ: XỬ LÝ NGÀY THÁNG ---
        const formatNgay = (dateStr, type = 'full') => {
            if (!dateStr) return '...'; 
            const [year, month, day] = dateStr.split('-');
            
            if (type === 'full') return `ngày ${day} tháng ${month} năm ${year}`;
            if (type === 'short') return `${day}/${month}/${year}`;
            if (type === 'd') return day;
            if (type === 'm') return month;
            if (type === 'y') return year;
            return dateStr;
        };

        const App = () => {
            // 1. BIẾN QUẢN LÝ DỮ LIỆU
            const [formData, setFormData] = React.useState({
                tenDuAn: '',
                chuDauTu: '',
                nguonVon: '', 
                tongMucDauTu: '',
                soQuyetDinhDA: '',
                tenGoiThau: '',
                hinhThucLCNT: 'Chỉ định thầu rút gọn', 
                giaiDoanLCNT: 'Giai đoạn chuẩn bị', 
                loaiHopDong: 'Trọn gói',
                thoiGianThucHien: '', 
                tenNhaThau: '', 
                phuongThucLCNT: 'Một giai đoạn một túi hồ sơ', 
                soTienDamBaoDuThau: ''
                // Các biến Số và Ngày tháng giờ sẽ được lưu động (dynamic) theo ID văn bản
            });

            const [activeTab, setActiveTab] = React.useState('cauhinh'); 
            const [isGenerating, setIsGenerating] = React.useState(false);
            const [generatingDocId, setGeneratingDocId] = React.useState(null);
            const fileInputRef = React.useRef(null);

            // 2. LẤY CẤU HÌNH TỪ FILE BÊN NGOÀI (config.js)
            const logicTree = window.APP_CONFIG || {};

            // Xác định danh sách file hiển thị ở giao diện DỰA VÀO LỰA CHỌN
            const currentFormLogic = logicTree[formData.hinhThucLCNT] || logicTree['Chỉ định thầu rút gọn'] || {};
            const danhSachGiaiDoan = Object.keys(currentFormLogic);
            const currentDocs = currentFormLogic[formData.giaiDoanLCNT] || [];

            // HÀM XỬ LÝ KHI NHẬP/CHỌN DỮ LIỆU THAY ĐỔI
            const handleInputChange = (e) => {
                const { name, value } = e.target;
                
                setFormData(prevData => {
                    const newData = { ...prevData, [name]: value };
                    
                    if (name === 'hinhThucLCNT') {
                        const availablePhases = Object.keys(logicTree[value] || logicTree['Chỉ định thầu rút gọn'] || {});
                        if(availablePhases.length > 0) {
                            newData.giaiDoanLCNT = availablePhases[0];
                        }
                    }
                    
                    return newData;
                });
            };

            const handleNumberChange = (e) => {
                const { name, value } = e.target;
                let rawValue = value.replace(/\D/g, ''); 
                let formattedValue = rawValue.replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
                setFormData({
                    ...formData,
                    [name]: formattedValue
                });
            };

            const handleExportData = () => {
                const dataStr = JSON.stringify(formData, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const fileName = formData.tenGoiThau ? `DuLieu_${formData.tenGoiThau.replace(/\s+/g, '_')}.json` : 'DuLieu_ChuaDatTen.json';
                saveAs(blob, fileName);
            };

            const handleImportData = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        setFormData(prevData => {
                            const updatedData = { ...prevData, ...importedData };
                            if (updatedData.hinhThucLCNT && logicTree[updatedData.hinhThucLCNT]) {
                                const validPhases = Object.keys(logicTree[updatedData.hinhThucLCNT]);
                                if (!validPhases.includes(updatedData.giaiDoanLCNT)) {
                                    updatedData.giaiDoanLCNT = validPhases[0];
                                }
                            }
                            return updatedData;
                        });
                        alert("Đã nhập dữ liệu thành công!");
                    } catch (err) {
                        alert("Lỗi! File không đúng định dạng. Vui lòng chọn file .json bạn đã lưu trước đó.");
                    }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            // HÀM TẠO FILE LẺ
            const generateSingleDocument = async (docInfo) => {
                if (!formData.tenDuAn || !formData.tenGoiThau) {
                    alert("Vui lòng nhập Tên dự án và Tên gói thầu trước khi tải biểu mẫu!");
                    return;
                }

                setGeneratingDocId(docInfo.id); 

                try {
                    const response = await fetch('./' + docInfo.filename);
                    if (!response.ok) {
                        throw new Error(`Không tìm thấy file mẫu "${docInfo.filename}" trên GitHub. Vui lòng kiểm tra lại tên file.`);
                    }
                    const arrayBuffer = await response.arrayBuffer();
                    
                    let zip;
                    try {
                        zip = new window.PizZip(arrayBuffer);
                    } catch (zipError) {
                        throw new Error(`Tải thất bại! File "${docInfo.filename}" bị lỗi hoặc không phải định dạng Word (.docx).`);
                    }

                    const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                    const dynamicDates = {};
                    Object.keys(formData).forEach(key => {
                        if (key.startsWith('ngay_')) {
                            dynamicDates[`${key}Full`] = formatNgay(formData[key], 'full');
                            dynamicDates[`${key}Short`] = formatNgay(formData[key], 'short');
                            dynamicDates[`${key}_d`] = formatNgay(formData[key], 'd');
                            dynamicDates[`${key}_m`] = formatNgay(formData[key], 'm');
                            dynamicDates[`${key}_y`] = formatNgay(formData[key], 'y');
                        }
                    });

                    const dataToRender = {
                        ...formData,
                        tongMucDauTuBangChu: docTien(formData.tongMucDauTu),
                        soTienDamBaoDuThauBangChu: docTien(formData.soTienDamBaoDuThau), 
                        ...dynamicDates
                    };

                    doc.render(dataToRender); 

                    const docBlob = doc.getZip().generate({
                        type: "blob",
                        mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    });

                    let cleanDocName = docInfo.name.replace(/^[0-9.]+\s*/, '');
                    saveAs(docBlob, `${cleanDocName}_${formData.tenGoiThau.replace(/\s+/g, '_')}.docx`);

                } catch (err) {
                    console.error(`Lỗi khi tạo file lẻ ${docInfo.filename}:`, err);
                    alert(err.message);
                } finally {
                    setGeneratingDocId(null); 
                }
            };

            const generateDocument = async () => {
                if (!formData.tenDuAn || !formData.tenGoiThau) {
                    alert("Vui lòng nhập Tên dự án và Tên gói thầu trước khi xuất file!");
                    return;
                }

                setIsGenerating(true);

                try {
                    if (typeof window.JSZip === 'undefined') {
                        throw new Error("Thư viện JSZip chưa tải xong. Vui lòng F5 tải lại trang.");
                    }

                    const currentDocsToGen = currentDocs; 
                    if (currentDocsToGen.length === 0) {
                        throw new Error(`Chưa có biểu mẫu nào được cấu hình cho phần ${formData.hinhThucLCNT} - ${formData.giaiDoanLCNT}.`);
                    }

                    const zipArchive = new window.JSZip();
                    let successCount = 0;
                    let errorFiles = [];
                    
                    for (const docInfo of currentDocsToGen) {
                        try {
                            const response = await fetch('./' + docInfo.filename);
                            if (!response.ok) {
                                errorFiles.push(docInfo.filename);
                                continue; 
                            }
                            const arrayBuffer = await response.arrayBuffer();
                            
                            let zip;
                            try {
                                zip = new window.PizZip(arrayBuffer);
                            } catch (e) {
                                errorFiles.push(docInfo.filename);
                                continue;
                            }

                            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                            const dynamicDates = {};
                            Object.keys(formData).forEach(key => {
                                if (key.startsWith('ngay_')) {
                                    dynamicDates[`${key}Full`] = formatNgay(formData[key], 'full');
                                    dynamicDates[`${key}Short`] = formatNgay(formData[key], 'short');
                                    dynamicDates[`${key}_d`] = formatNgay(formData[key], 'd');
                                    dynamicDates[`${key}_m`] = formatNgay(formData[key], 'm');
                                    dynamicDates[`${key}_y`] = formatNgay(formData[key], 'y');
                                }
                            });

                            const dataToRender = {
                                ...formData,
                                tongMucDauTuBangChu: docTien(formData.tongMucDauTu),
                                soTienDamBaoDuThauBangChu: docTien(formData.soTienDamBaoDuThau), 
                                ...dynamicDates
                            };

                            doc.render(dataToRender); 

                            const docBlob = doc.getZip().generate({
                                type: "blob",
                                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                            });

                            zipArchive.file(`${docInfo.name}.docx`, docBlob);
                            successCount++;

                        } catch (err) {
                            console.error(`Lỗi khi xử lý file ${docInfo.filename}:`, err);
                        }
                    }

                    if (successCount === 0) {
                        throw new Error("Không tải được file nào. Đảm bảo bạn đã upload các file Word có tên chính xác lên GitHub.");
                    }

                    if (errorFiles.length > 0) {
                        alert(`Đã nén thành công ${successCount} file.\n\nTuy nhiên, các file sau bị bỏ qua do chưa có trên GitHub hoặc sai định dạng:\n- ${errorFiles.join('\n- ')}`);
                    }

                    const content = await zipArchive.generateAsync({ type: "blob" });
                    saveAs(content, `Ho_So_${formData.tenGoiThau.replace(/\s+/g, '_')}_${formData.giaiDoanLCNT.replace(/\s+/g, '')}.zip`);
                    
                } catch (error) {
                    console.error("Lỗi tạo file ZIP:", error);
                    alert("Có lỗi xảy ra: " + error.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            // Nếu không tìm thấy file cấu hình
            if (!window.APP_CONFIG || Object.keys(logicTree).length === 0) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50">
                        <div className="bg-white p-8 rounded-xl shadow text-center max-w-md border border-red-200">
                            <h2 className="text-xl font-bold text-red-600 mb-4">Lỗi tải cấu hình!</h2>
                            <p className="text-slate-600 mb-4">Không tìm thấy file <strong>config.js</strong>. Vui lòng đảm bảo bạn đã tạo file này trên GitHub theo hướng dẫn.</p>
                            <p className="text-sm bg-slate-100 p-3 rounded">Lưu ý: Nếu bạn đang chạy trực tiếp file HTML trên máy tính thay vì máy chủ, trình duyệt có thể chặn file này do lỗi CORS.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        
                        {/* HEADER MỚI CHUẨN BRANDING ACV CẦN THƠ */}
                        <header className="mb-8 bg-[#00529c] rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row md:items-end justify-between border-b-[5px] border-[#d4a026]">
                            <div className="p-6 md:pb-6">
                                <h2 className="text-[12px] md:text-[13px] font-medium text-blue-100 mb-1 uppercase tracking-wide">
                                    TCT CẢNG HÀNG KHÔNG VIỆT NAM - CTCP
                                </h2>
                                <h1 className="text-[12.5px] md:text-[14.5px] leading-tight font-bold text-white mb-2 uppercase tracking-tight drop-shadow-sm">
                                    Cảng Hàng không quốc tế Cần Thơ
                                </h1>
                                <div className="inline-block bg-white/20 backdrop-blur-sm px-2 py-0.5 rounded text-[12px] md:text-[13px] font-medium text-white border border-white/10 shadow-inner">
                                    Phòng TC-KH | HT AutoDocs Mua sắm
                                </div>
                            </div>
                            
                            <div className="p-6 pt-0 md:pt-6 flex space-x-3">
                                <input 
                                    type="file" 
                                    accept=".json" 
                                    ref={fileInputRef} 
                                    onChange={handleImportData} 
                                    className="hidden" 
                                />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="bg-white/10 hover:bg-white/20 text-white border border-white/20 font-medium py-2 px-4 rounded-lg shadow-sm flex items-center transition-all text-sm backdrop-blur-sm"
                                >
                                    <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                    Nhập dữ liệu
                                </button>
                                <button 
                                    onClick={handleExportData}
                                    className="bg-white text-[#00529c] hover:bg-blue-50 font-bold py-2 px-4 rounded-lg shadow-md flex items-center transition-all text-sm"
                                >
                                    <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"></path></svg>
                                    Lưu dữ liệu
                                </button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2">
                                
                                {/* KHUNG CHỨA TABS CHÍNH */}
                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    
                                    {/* THANH ĐIỀU HƯỚNG TABS */}
                                    <div className="flex flex-nowrap overflow-x-auto border-b border-slate-200 bg-slate-50">
                                        <button 
                                            onClick={() => setActiveTab('cauhinh')}
                                            className={`flex-shrink-0 py-3 px-5 font-semibold text-sm border-b-2 transition-colors flex items-center ${activeTab === 'cauhinh' ? 'border-[#00529c] text-[#00529c] bg-white' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}
                                        >
                                            <span className={`w-6 h-6 rounded-full inline-flex items-center justify-center mr-2 text-xs ${activeTab === 'cauhinh' ? 'bg-[#00529c] text-white' : 'bg-slate-200 text-slate-600'}`}>1</span>
                                            Cấu hình
                                        </button>
                                        <button 
                                            onClick={() => setActiveTab('duan')}
                                            className={`flex-shrink-0 py-3 px-5 font-semibold text-sm border-b-2 transition-colors flex items-center ${activeTab === 'duan' ? 'border-[#00529c] text-[#00529c] bg-white' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}
                                        >
                                            <span className={`w-6 h-6 rounded-full inline-flex items-center justify-center mr-2 text-xs ${activeTab === 'duan' ? 'bg-[#00529c] text-white' : 'bg-slate-200 text-slate-600'}`}>2</span>
                                            Dự án
                                        </button>
                                        <button 
                                            onClick={() => setActiveTab('goithau')}
                                            className={`flex-shrink-0 py-3 px-5 font-semibold text-sm border-b-2 transition-colors flex items-center ${activeTab === 'goithau' ? 'border-[#00529c] text-[#00529c] bg-white' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}
                                        >
                                            <span className={`w-6 h-6 rounded-full inline-flex items-center justify-center mr-2 text-xs ${activeTab === 'goithau' ? 'bg-[#00529c] text-white' : 'bg-slate-200 text-slate-600'}`}>3</span>
                                            Gói thầu
                                        </button>
                                        <button 
                                            onClick={() => setActiveTab('cancu')}
                                            className={`flex-shrink-0 py-3 px-5 font-semibold text-sm border-b-2 transition-colors flex items-center ${activeTab === 'cancu' ? 'border-[#00529c] text-[#00529c] bg-white' : 'border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}
                                        >
                                            <span className={`w-6 h-6 rounded-full inline-flex items-center justify-center mr-2 text-xs ${activeTab === 'cancu' ? 'bg-[#00529c] text-white' : 'bg-slate-200 text-slate-600'}`}>4</span>
                                            Ngày tháng Văn bản
                                        </button>
                                    </div>

                                    {/* NỘI DUNG TABS */}
                                    <div className="p-6">
                                        
                                        {/* TAB 1: CẤU HÌNH */}
                                        <div className={activeTab === 'cauhinh' ? 'block' : 'hidden'}>
                                            <h2 className="text-xl font-semibold mb-6 text-slate-700 border-b pb-2">1. Cấu hình quy trình xuất biểu mẫu</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">1.1. Hình thức LCNT <span className="text-red-500">*</span></label>
                                                    <select name="hinhThucLCNT" value={formData.hinhThucLCNT} onChange={handleInputChange} className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none bg-blue-50 font-bold text-[#00529c] shadow-sm cursor-pointer transition-colors">
                                                        {Object.keys(logicTree).map(key => (
                                                            <option key={key} value={key}>{key}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">1.2. Giai đoạn thực hiện <span className="text-red-500">*</span></label>
                                                    <select name="giaiDoanLCNT" value={formData.giaiDoanLCNT} onChange={handleInputChange} className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none bg-blue-50 font-bold text-[#00529c] shadow-sm cursor-pointer transition-colors">
                                                        {danhSachGiaiDoan.map(step => (
                                                            <option key={step} value={step}>{step}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                
                                                {/* DANH SÁCH BIỂU MẪU TỰ ĐỘNG CẬP NHẬT TRONG TAB CẤU HÌNH - HỖ TRỢ CLICK TẢI LẺ */}
                                                <div className="col-span-1 md:col-span-2 border-t border-slate-100 pt-4 mt-2">
                                                    <h3 className="text-md font-bold text-slate-700 mb-3 flex items-center">
                                                        <svg className="w-5 h-5 mr-2 text-[#00529c]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                                                        Danh mục biểu mẫu (Nhấn vào tên để tải riêng 1 file):
                                                    </h3>
                                                    {currentDocs.length > 0 ? (
                                                        <ul className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                            {currentDocs.map(doc => (
                                                                <li 
                                                                    key={doc.id} 
                                                                    onClick={() => generateSingleDocument(doc)}
                                                                    className="flex items-start text-sm bg-slate-50 text-slate-700 p-3 rounded-lg border border-slate-200 shadow-sm cursor-pointer hover:bg-blue-50 hover:border-blue-300 hover:text-[#00529c] transition-colors group"
                                                                    title="Nhấn để tải và trộn dữ liệu riêng file này"
                                                                >
                                                                    {generatingDocId === doc.id ? (
                                                                        <svg className="animate-spin h-5 w-5 text-blue-500 mr-2 shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                                        </svg>
                                                                    ) : (
                                                                        <svg className="w-5 h-5 text-[#00529c] mr-2 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                                                    )}
                                                                    <span className="font-medium flex-1">{doc.name}</span>
                                                                    <svg className="w-4 h-4 text-slate-400 group-hover:text-blue-500 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    ) : (
                                                        <div className="text-sm text-red-600 bg-red-50 p-3 rounded-lg border border-red-200 flex items-center">
                                                            <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                                            Chưa có biểu mẫu nào được cấu hình cho Giai đoạn này.
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        </div>

                                        {/* TAB 2: DỰ ÁN */}
                                        <div className={activeTab === 'duan' ? 'block' : 'hidden'}>
                                            <h2 className="text-xl font-semibold mb-6 text-slate-700 border-b pb-2">2. Thông tin chung Dự án</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="col-span-1 md:col-span-2">
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Tên Dự án <span className="text-red-500">*</span></label>
                                                    <input type="text" name="tenDuAn" value={formData.tenDuAn} onChange={handleInputChange} placeholder="VD: Xây dựng trường mầm non A" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Chủ đầu tư</label>
                                                    <input type="text" name="chuDauTu" value={formData.chuDauTu} onChange={handleInputChange} placeholder="VD: UBND Huyện B" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Nguồn vốn</label>
                                                    <input type="text" name="nguonVon" value={formData.nguonVon} onChange={handleInputChange} placeholder="VD: Ngân sách nhà nước" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Số QĐ Phê duyệt Dự án</label>
                                                    <input type="text" name="soQuyetDinhDA" value={formData.soQuyetDinhDA} onChange={handleInputChange} placeholder="VD: 123/QĐ-UBND" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none" />
                                                </div>
                                            </div>
                                        </div>

                                        {/* TAB 3: GÓI THẦU */}
                                        <div className={activeTab === 'goithau' ? 'block' : 'hidden'}>
                                            <h2 className="text-xl font-semibold mb-6 text-slate-700 border-b pb-2">3. Chi tiết Gói thầu</h2>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="col-span-1 md:col-span-2">
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Tên Gói thầu <span className="text-red-500">*</span></label>
                                                    <input type="text" name="tenGoiThau" value={formData.tenGoiThau} onChange={handleInputChange} placeholder="VD: Thi công xây lắp hạng mục chính" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none" />
                                                </div>
                                                
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Loại Hợp đồng</label>
                                                    <select name="loaiHopDong" value={formData.loaiHopDong} onChange={handleInputChange} className="w-full px-4 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-[#00529c] outline-none">
                                                        <option value="Trọn gói">Trọn gói</option>
                                                        <option value="Theo đơn giá cố định">Theo đơn giá cố định</option>
                                                        <option value="Theo đơn giá điều chỉnh">Theo đơn giá điều chỉnh</option>
                                                    </select>
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Thời gian thực hiện (ngày)</label>
                                                    <input type="text" name="thoiGianThucHien" value={formData.thoiGianThucHien} onChange={handleInputChange} placeholder="VD: 120" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none" />
                                                </div>

                                                <div className="col-span-1 md:col-span-2 border-t border-slate-100 mt-2 pt-4">
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">Tổng mức đầu tư (Giá trị gói thầu) - VNĐ</label>
                                                    <input type="text" name="tongMucDauTu" value={formData.tongMucDauTu} onChange={handleNumberChange} placeholder="VD: 15.000.000.000" className="w-full px-4 py-2 font-semibold text-[#00529c] border border-slate-300 rounded-lg focus:ring-2 focus:ring-[#00529c] outline-none" />
                                                    {formData.tongMucDauTu && (
                                                        <p className="text-sm text-[#00529c] mt-2 italic bg-blue-50 p-2 rounded">
                                                            <strong>Bằng chữ:</strong> {docTien(formData.tongMucDauTu)}
                                                        </p>
                                                    )}
                                                </div>

                                                {/* TÙY BIẾN 1: Tên nhà thầu áp dụng cho các hình thức hạn chế */}
                                                {['Chỉ định thầu rút gọn', 'Dưới 50 triệu', 'Chào giá hạn chế'].includes(formData.hinhThucLCNT) && (
                                                    <div className="col-span-1 md:col-span-2 bg-green-50 p-4 rounded-lg border border-green-200 mt-2">
                                                        <h3 className="text-sm font-bold text-green-800 mb-2">✦ Thông tin dành riêng cho Nhà thầu</h3>
                                                        <label className="block text-sm font-medium text-slate-700 mb-1">Tên Nhà thầu (hoặc dự kiến)</label>
                                                        <input type="text" name="tenNhaThau" value={formData.tenNhaThau} onChange={handleInputChange} placeholder="VD: Công ty Cổ phần Xây dựng XYZ" className="w-full px-4 py-2 border border-green-300 rounded-lg focus:ring-2 focus:ring-green-500 outline-none" />
                                                    </div>
                                                )}

                                                {/* TÙY BIẾN 2: Phương thức LCNT cho các hình thức mở rộng */}
                                                {['Đấu thầu rộng rãi', 'Chào giá rộng rãi'].includes(formData.hinhThucLCNT) && (
                                                    <div className="col-span-1 md:col-span-2 bg-amber-50 p-4 rounded-lg border border-amber-200 mt-2">
                                                        <h3 className="text-sm font-bold text-amber-800 mb-3">✦ Thông tin dành riêng cho Đấu thầu</h3>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                            <div>
                                                                <label className="block text-sm font-medium text-slate-700 mb-1">Phương thức LCNT</label>
                                                                <select name="phuongThucLCNT" value={formData.phuongThucLCNT} onChange={handleInputChange} className="w-full px-4 py-2 border border-amber-300 rounded-lg bg-white outline-none focus:ring-2 focus:ring-amber-500">
                                                                    <option value="Một giai đoạn một túi hồ sơ">Một giai đoạn một túi hồ sơ</option>
                                                                    <option value="Một giai đoạn hai túi hồ sơ">Một giai đoạn hai túi hồ sơ</option>
                                                                </select>
                                                            </div>
                                                            <div>
                                                                <label className="block text-sm font-medium text-slate-700 mb-1">Giá trị Bảo đảm dự thầu (VNĐ)</label>
                                                                <input type="text" name="soTienDamBaoDuThau" value={formData.soTienDamBaoDuThau} onChange={handleNumberChange} placeholder="VD: 15.000.000" className="w-full px-4 py-2 border border-amber-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none" />
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}

                                            </div>
                                        </div>

                                        {/* TAB 4: NGÀY THÁNG VĂN BẢN (THIẾT KẾ ĐỘNG MỚI) */}
                                        <div className={activeTab === 'cancu' ? 'block' : 'hidden'}>
                                            <h2 className="text-xl font-semibold mb-2 text-slate-700 border-b pb-2">4. Ngày tháng & Số hiệu Văn bản</h2>
                                            <p className="text-sm text-slate-500 mb-6">Nhập Số và Ngày tháng cho toàn bộ các văn bản thuộc quy trình <strong>{formData.hinhThucLCNT}</strong>. Các thông tin này sẽ tự động liên kết làm căn cứ cho các bước sau.</p>
                                            
                                            <div className="space-y-6">
                                                {Object.entries(logicTree[formData.hinhThucLCNT] || {}).map(([phaseName, phaseDocs]) => (
                                                    <div key={phaseName} className="border border-slate-200 rounded-lg overflow-hidden shadow-sm">
                                                        <div className="bg-slate-100 px-4 py-3 font-bold text-[#00529c] border-b border-slate-200">
                                                            {phaseName}
                                                        </div>
                                                        <div className="p-4 space-y-4">
                                                            {phaseDocs.map(doc => (
                                                                <div key={doc.id} className="grid grid-cols-1 md:grid-cols-12 gap-4 items-center pb-4 border-b border-slate-100 last:border-0 last:pb-0">
                                                                    <div className="md:col-span-6 font-medium text-sm text-slate-800 leading-snug">
                                                                        {doc.name}
                                                                        <span className="block text-xs text-slate-400 font-normal mt-1">(Mã biến: {doc.id})</span>
                                                                    </div>
                                                                    <div className="md:col-span-3">
                                                                        <input 
                                                                            type="text" 
                                                                            name={`so_${doc.id}`} 
                                                                            value={formData[`so_${doc.id}`] || ''} 
                                                                            onChange={handleInputChange} 
                                                                            placeholder="Số văn bản..." 
                                                                            className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-[#00529c] outline-none" 
                                                                        />
                                                                    </div>
                                                                    <div className="md:col-span-3">
                                                                        <input 
                                                                            type="date" 
                                                                            name={`ngay_${doc.id}`} 
                                                                            value={formData[`ngay_${doc.id}`] || ''} 
                                                                            onChange={handleInputChange} 
                                                                            className="w-full px-3 py-2 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-[#00529c] outline-none text-slate-700" 
                                                                        />
                                                                    </div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            
                                            <div className="mt-6 bg-amber-50 p-4 rounded-lg border border-amber-200 text-sm text-amber-800 shadow-sm">
                                                <strong>💡 Hướng dẫn chèn biến vào Word:</strong>
                                                <ul className="list-disc ml-5 mt-2 space-y-1">
                                                    <li>Để in ra "Số văn bản", hãy gõ: <code className="bg-amber-100 px-1 rounded font-mono font-bold text-amber-900">{`{so_mã_biến}`}</code></li>
                                                    <li>Để in ra "Ngày tháng năm", hãy gõ: <code className="bg-amber-100 px-1 rounded font-mono font-bold text-amber-900">{`{ngay_mã_biếnFull}`}</code></li>
                                                    <li><strong>Ví dụ:</strong> Nếu muốn Căn cứ vào Quyết định mua sắm (Mã: <strong>d50_1</strong>), bạn gõ vào Word như sau: <br/><i className="text-amber-700 mt-1 block border-l-2 border-amber-400 pl-2">"Căn cứ Quyết định số <strong>{`{so_d50_1}`}</strong> <strong>{`{ngay_d50_1Full}`}</strong> về việc phê duyệt mua sắm..."</i></li>
                                                </ul>
                                            </div>
                                        </div>

                                    </div>
                                </div>

                                {/* NÚT NEXT/PREV */}
                                <div className="flex justify-between items-center px-2 mt-4">
                                    <button 
                                        onClick={() => {
                                            if(activeTab === 'duan') setActiveTab('cauhinh');
                                            if(activeTab === 'goithau') setActiveTab('duan');
                                            if(activeTab === 'cancu') setActiveTab('goithau');
                                        }}
                                        className={`px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors ${activeTab === 'cauhinh' ? 'invisible' : ''}`}
                                    >
                                        &larr; Quay lại
                                    </button>
                                    <button 
                                        onClick={() => {
                                            if(activeTab === 'cauhinh') setActiveTab('duan');
                                            if(activeTab === 'duan') setActiveTab('goithau');
                                            if(activeTab === 'goithau') setActiveTab('cancu');
                                        }}
                                        className={`px-6 py-2 bg-[#00529c] text-white rounded-lg text-sm font-bold hover:bg-blue-800 shadow-md transition-colors ${activeTab === 'cancu' ? 'invisible' : ''}`}
                                    >
                                        Tiếp tục &rarr;
                                    </button>
                                </div>

                            </div>

                            {/* Cột phải: Xuất file */}
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-white p-6 rounded-xl border border-slate-200 sticky top-4 shadow-sm">
                                    <h3 className="font-bold text-[#00529c] mb-2 text-lg">Đóng gói Hồ sơ</h3>
                                    <p className="text-sm text-slate-600 mb-4">
                                        Hệ thống sẽ trộn dữ liệu vào <strong>{currentDocs.length} biểu mẫu</strong> 
                                        <br/>(của hình thức <span className="font-semibold text-slate-800">{formData.hinhThucLCNT}</span> - <span className="font-semibold text-slate-800">{formData.giaiDoanLCNT}</span>). Nhấn vào tên 1 file để tải lẻ, hoặc nhấn nút xanh dưới cùng để tải file .ZIP.
                                    </p>
                                    
                                    {currentDocs.length > 0 ? (
                                        <ul className="text-xs text-slate-700 mb-6 space-y-1">
                                            {currentDocs.map(doc => (
                                                <li 
                                                    key={doc.id} 
                                                    onClick={() => generateSingleDocument(doc)}
                                                    className="flex items-start cursor-pointer group p-1.5 -mx-1.5 rounded hover:bg-blue-50 transition-colors"
                                                    title="Nhấn để tải riêng file này"
                                                >
                                                    {generatingDocId === doc.id ? (
                                                        <svg className="animate-spin h-4 w-4 text-blue-500 mr-2 shrink-0 mt-0.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                        </svg>
                                                    ) : (
                                                        <svg className="w-4 h-4 text-green-500 mr-2 shrink-0 mt-0.5 group-hover:text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg>
                                                    )}
                                                    <span className="flex-1 group-hover:text-[#00529c] font-medium transition-colors">{doc.name}</span>
                                                    <svg className="w-4 h-4 text-transparent group-hover:text-[#00529c] ml-1 mt-0.5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                                </li>
                                            ))}
                                        </ul>
                                    ) : (
                                        <div className="text-xs text-red-600 bg-red-50 p-2 rounded mb-6 border border-red-200">
                                            ⚠️ Chưa có biểu mẫu nào được cấu hình cho Giai đoạn này.
                                        </div>
                                    )}

                                    <button 
                                        onClick={generateDocument}
                                        disabled={isGenerating || currentDocs.length === 0}
                                        className={`w-full text-white font-bold py-3 px-4 rounded-lg shadow-md transition-all flex justify-center items-center ${(isGenerating || currentDocs.length === 0) ? 'bg-slate-400 cursor-not-allowed' : 'bg-[#00529c] hover:bg-blue-800 hover:shadow-lg'}`}
                                    >
                                        {isGenerating ? (
                                            <span className="flex items-center">
                                                <svg className="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                </svg>
                                                Đang tạo & nén ZIP...
                                            </span>
                                        ) : (
                                            <span className="flex items-center">
                                                <svg className="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                                Xuất File .ZIP Hồ Sơ
                                            </span>
                                        )}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
