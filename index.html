<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống AutoBid - Tự động hóa Hồ sơ Đấu thầu</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (Biên dịch JSX trực tiếp trên trình duyệt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- THƯ VIỆN XỬ LÝ WORD VÀ TẢI FILE -->
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.11/build/docxtemplater.js"></script>
    <!-- THƯ VIỆN MỚI: DÙNG ĐỂ NÉN NHIỀU FILE THÀNH 1 FILE .ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            // Mở rộng thêm một số trường dữ liệu để form sát thực tế hơn
            const [formData, setFormData] = React.useState({
                tenDuAn: '',
                chuDauTu: '',
                tongMucDauTu: '',
                tenGoiThau: '',
                hinhThucLCNT: 'Chỉ định thầu rút gọn',
                loaiHopDong: 'Trọn gói',
                tenNhaThau: '', // Thêm mới
                soQuyetDinhDA: '' // Thêm mới
            });

            const [isGenerating, setIsGenerating] = React.useState(false);

            // NÂNG CẤP: Gắn kết tên biểu mẫu với tên file Word thật sự bạn sẽ tải lên GitHub
            const logicTree = {
                'Chỉ định thầu rút gọn': [
                    { id: 'tt1', name: '01. Tờ trình phê duyệt KHLCNT', filename: '01_ToTrinh_KHLCNT.docx' },
                    { id: 'qd1', name: '02. Quyết định phê duyệt KHLCNT', filename: '02_QuyetDinh_KHLCNT.docx' },
                    { id: 'hd1', name: '03. Hợp đồng kinh tế', filename: '03_HopDong.docx' }
                ],
                'Đấu thầu rộng rãi': [
                    { id: 'tt1', name: '01. Tờ trình phê duyệt KHLCNT', filename: '01_ToTrinh_KHLCNT.docx' },
                    { id: 'qd1', name: '02. Quyết định phê duyệt KHLCNT', filename: '02_QuyetDinh_KHLCNT.docx' },
                    { id: 'tcg', name: '03. Quyết định lập Tổ chuyên gia', filename: '03_LapToChuyenGia.docx' }
                ]
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({
                    ...formData,
                    [name]: value
                });
            };

            // HÀM LÕI MỚI: Tải nhiều file, trộn dữ liệu, và nén thành ZIP
            const generateDocument = async () => {
                if (!formData.tenDuAn || !formData.tenGoiThau) {
                    alert("Vui lòng nhập Tên dự án và Tên gói thầu trước khi xuất file!");
                    return;
                }

                setIsGenerating(true);

                try {
                    // Kiểm tra thư viện nén ZIP
                    if (typeof window.JSZip === 'undefined') {
                        throw new Error("Thư viện JSZip chưa tải xong. Vui lòng F5 tải lại trang.");
                    }

                    const currentDocs = logicTree[formData.hinhThucLCNT] || logicTree['Chỉ định thầu rút gọn'];
                    
                    // Tạo một hộp ZIP trống để chuẩn bị bỏ các file Word vào
                    const zipArchive = new window.JSZip();
                    
                    // Lặp qua từng file trong danh sách cần sinh ra
                    let successCount = 0;
                    for (const docInfo of currentDocs) {
                        try {
                            // 1. Tải file mẫu tương ứng
                            const response = await fetch('./' + docInfo.filename);
                            if (!response.ok) {
                                console.warn(`Bỏ qua ${docInfo.filename} vì không tìm thấy trên server.`);
                                continue; // Bỏ qua file này, tiếp tục tải file khác
                            }
                            const arrayBuffer = await response.arrayBuffer();

                            // 2. Mở file Word và trộn dữ liệu
                            const zip = new window.PizZip(arrayBuffer);
                            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                            doc.render(formData); // Bơm toàn bộ formData vào file Word

                            // 3. Đóng gói lại thành file Word đã hoàn thiện
                            const docBlob = doc.getZip().generate({
                                type: "blob",
                                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                            });

                            // 4. Bỏ file Word vừa trộn xong vào hộp ZIP tổng, đặt tên file rõ ràng
                            zipArchive.file(`${docInfo.name}.docx`, docBlob);
                            successCount++;

                        } catch (err) {
                            console.error(`Lỗi khi xử lý file ${docInfo.filename}:`, err);
                        }
                    }

                    if (successCount === 0) {
                        throw new Error("Không thể tạo được file nào. Vui lòng kiểm tra lại xem bạn đã tải các file Word mẫu (như 01_ToTrinh_KHLCNT.docx) lên GitHub chưa?");
                    }

                    // 5. Khóa hộp ZIP lại và tải xuống máy người dùng
                    const content = await zipArchive.generateAsync({ type: "blob" });
                    saveAs(content, `Ho_So_${formData.tenGoiThau.replace(/\s+/g, '_')}.zip`);
                    
                } catch (error) {
                    console.error("Lỗi tạo file ZIP:", error);
                    alert("Có lỗi xảy ra: " + error.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            const currentDocs = logicTree[formData.hinhThucLCNT] || logicTree['Chỉ định thầu rút gọn'];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 border-b pb-4 border-slate-200">
                            <h1 className="text-3xl font-bold text-blue-900 tracking-tight">Hệ thống AutoBid PRO</h1>
                            <p className="text-slate-500 mt-1">Tự động hóa trộn đa biểu mẫu & Đóng gói ZIP</p>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-6">
                                {/* Box 1: Thông tin Dự án */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h2 className="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                                        <span className="bg-blue-100 text-blue-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">1</span>
                                        Thông tin chung Dự án
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tên Dự án <span className="text-red-500">*</span></label>
                                            <input type="text" name="tenDuAn" value={formData.tenDuAn} onChange={handleInputChange} placeholder="VD: Xây dựng trường mầm non A" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Chủ đầu tư</label>
                                            <input type="text" name="chuDauTu" value={formData.chuDauTu} onChange={handleInputChange} placeholder="VD: UBND Huyện B" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Số QĐ Phê duyệt Dự án</label>
                                            <input type="text" name="soQuyetDinhDA" value={formData.soQuyetDinhDA} onChange={handleInputChange} placeholder="VD: 123/QĐ-UBND" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                    </div>
                                </div>

                                {/* Box 2: Chi tiết Gói thầu */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <h2 className="text-xl font-semibold mb-4 text-slate-700 flex items-center">
                                        <span className="bg-emerald-100 text-emerald-800 w-8 h-8 rounded-full inline-flex items-center justify-center mr-3 text-sm">2</span>
                                        Chi tiết Gói thầu
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="col-span-1 md:col-span-2">
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tên Gói thầu <span className="text-red-500">*</span></label>
                                            <input type="text" name="tenGoiThau" value={formData.tenGoiThau} onChange={handleInputChange} placeholder="VD: Thi công xây lắp hạng mục chính" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Hình thức LCNT</label>
                                            <select name="hinhThucLCNT" value={formData.hinhThucLCNT} onChange={handleInputChange} className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none bg-white">
                                                {Object.keys(logicTree).map(key => (
                                                    <option key={key} value={key}>{key}</option>
                                                ))}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tên Nhà thầu (dự kiến)</label>
                                            <input type="text" name="tenNhaThau" value={formData.tenNhaThau} onChange={handleInputChange} placeholder="VD: Công ty Cổ phần Xây dựng XYZ" className="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:blue-500 outline-none" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Cột phải: Xuất file */}
                            <div className="lg:col-span-1 space-y-6">
                                <div className="bg-blue-50 p-6 rounded-xl border border-blue-100">
                                    <h3 className="font-bold text-blue-900 mb-2">Đóng gói Hồ sơ</h3>
                                    <p className="text-sm text-blue-700 mb-4">Hệ thống sẽ trộn dữ liệu vào <strong>{currentDocs.length} biểu mẫu</strong> và nén thành 1 file .ZIP cho bạn tải về.</p>
                                    
                                    <ul className="text-xs text-blue-800 mb-6 space-y-1">
                                        {currentDocs.map(doc => (
                                            <li key={doc.id}>✓ {doc.name}</li>
                                        ))}
                                    </ul>

                                    <button 
                                        onClick={generateDocument}
                                        disabled={isGenerating}
                                        className={`w-full text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors flex justify-center items-center ${isGenerating ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                                    >
                                        {isGenerating ? 'Đang tạo & nén ZIP...' : `Xuất File .ZIP Hồ Sơ`}
                                    </button>
                                </div>
                                <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-sm text-amber-800">
                                    <strong>💡 Nhiệm vụ của bạn:</strong> Cần đổi tên các file mẫu Word của bạn thành <code>01_ToTrinh_KHLCNT.docx</code>, <code>02_QuyetDinh_KHLCNT.docx</code>... và up lên GitHub để chức năng này hoạt động!
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
