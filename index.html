<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống AutoDocs - Cảng HKQT Cần Thơ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (Biên dịch JSX trực tiếp trên trình duyệt) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- THƯ VIỆN XỬ LÝ WORD VÀ TẢI FILE -->
    <script src="https://unpkg.com/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://unpkg.com/docxtemplater@3.37.11/build/docxtemplater.js"></script>
    <!-- THƯ VIỆN NÉN FILE ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        // --- HÀM HỖ TRỢ: ĐỌC SỐ TIỀN THÀNH CHỮ ---
        const docTien = (so) => {
            if (!so) return '';
            let str = parseInt(so.replace(/\D/g, '')).toString();
            if (str === 'NaN' || str === '0') return 'Không đồng';
            
            const chuSo = ["không", "một", "hai", "ba", "bốn", "năm", "sáu", "bảy", "tám", "chín"];
            const tien = ["", "nghìn", "triệu", "tỷ", "nghìn tỷ", "triệu tỷ"];
            let count = 0;
            let result = "";
            let rs = "";
            
            while (str.length > 0) {
                let len = str.length;
                let soPhanGhi = str.substring(Math.max(0, len - 3), len);
                str = str.substring(0, Math.max(0, len - 3));
                let num = parseInt(soPhanGhi);
                
                if (num > 0) {
                    let tram = Math.floor(num / 100);
                    let chuc = Math.floor((num % 100) / 10);
                    let donVi = num % 10;
                    rs = "";
                    
                    if (str.length > 0 || tram > 0) { 
                        rs += chuSo[tram] + " trăm ";
                        if (chuc === 0 && donVi > 0) rs += "lẻ ";
                    }
                    if (chuc === 1) rs += "mười ";
                    else if (chuc > 1) rs += chuSo[chuc] + " mươi ";
                    
                    if (donVi === 1 && chuc > 1) rs += "mốt ";
                    else if (donVi === 5 && chuc > 0) rs += "lăm ";
                    else if (donVi > 0) rs += chuSo[donVi] + " ";
                    
                    result = rs.trim() + " " + tien[count] + " " + result;
                } else if (count === 3 && result.trim() !== "") { 
                    result = tien[count] + " " + result;
                }
                count++;
            }
            result = result.replace(/\s+/g, ' ').trim();
            return result.charAt(0).toUpperCase() + result.slice(1) + " đồng chẵn";
        };

        // --- HÀM HỖ TRỢ: XỬ LÝ NGÀY THÁNG ---
        const formatNgay = (dateStr, type = 'full') => {
            if (!dateStr) return '...'; 
            const [year, month, day] = dateStr.split('-');
            
            if (type === 'full') return `ngày ${day} tháng ${month} năm ${year}`;
            if (type === 'short') return `${day}/${month}/${year}`;
            if (type === 'd') return day;
            if (type === 'm') return month;
            if (type === 'y') return year;
            return dateStr;
        };

        const App = () => {
            // 1. BIẾN QUẢN LÝ DỮ LIỆU
            const [formData, setFormData] = React.useState({
                tenDuAn: '',
                chuDauTu: '',
                nguonVon: '', 
                tongMucDauTu: '',
                soQuyetDinhDA: '',
                tenGoiThau: '',
                hinhThucLCNT: 'Chỉ định thầu rút gọn', 
                giaiDoanLCNT: 'Giai đoạn chuẩn bị', 
                loaiHopDong: 'Trọn gói',
                thoiGianThucHien: '', 
                tenNhaThau: '', 
                phuongThucLCNT: 'Một giai đoạn một túi hồ sơ', 
                soTienDamBaoDuThau: ''
                // Các biến Số và Ngày tháng giờ sẽ được lưu động (dynamic) theo ID văn bản
            });

            const [activeTab, setActiveTab] = React.useState('cauhinh'); 
            const [isGenerating, setIsGenerating] = React.useState(false);
            const fileInputRef = React.useRef(null);

            // 2. MA TRẬN LOGIC (HÌNH THỨC x GIAI ĐOẠN)
            const logicTree = {
                'Dưới 50 triệu': {
                    'Giai đoạn chuẩn bị': [
                        { id: 'd50_1', name: '01. Tờ trình phê duyệt chủ trương', filename: '01_ToTrinhChuTruong.docx' },
                        { id: 'd50_2', name: '02. Báo cáo mua sắm dưới 50 triệu', filename: '02_BaoCaoMuaSam_D50.docx' }
                    ],
                    'Giai đoạn thực hiện': [
                        { id: 'd50_3', name: '03. Hợp đồng', filename: '03_HopDong.docx' }
                    ]
                },
                'Chào giá hạn chế': {
                    'Giai đoạn chuẩn bị': [
                        { id: 'cghc_1', name: '01. Tờ trình phê duyệt chủ trương', filename: '01_ToTrinhChuTruong.docx' },
                        { id: 'cghc_2', name: '02. Báo cáo mua sắm dưới chào giá hạn chế', filename: '02_BaoCaoMuaSam_CGHC.docx' },
                        { id: 'cghc_3', name: '03. Thông báo mời chào giá', filename: '03_ThongBaoMoiChaoGia.docx' }
                    ],
                    'Giai đoạn thực hiện': [
                        { id: 'cghc_4', name: '04. Biên bản mở thư chào giá', filename: '04_BB_MoThuChaoGia.docx' },
                        { id: 'cghc_5', name: '05. Biên bản đánh giá hồ sơ chào giá', filename: '05_BB_DanhGiaHSCG.docx' },
                        { id: 'cghc_6', name: '06. Biên bản thương thảo hợp đồng', filename: '06_BB_ThuongThaoHD.docx' },
                        { id: 'cghc_7', name: '07. Báo cáo đánh giá hồ sơ chào giá', filename: '07_BC_DanhGiaHSCG.docx' },
                        { id: 'cghc_8', name: '08. Thông báo Kết quả chào giá', filename: '08_TB_KQLCNT.docx' },
                        { id: 'cghc_9', name: '09. Hợp đồng', filename: '09_HopDong.docx' }
                    ]
                },
                'Chào giá rộng rãi': {
                    'Giai đoạn chuẩn bị': [
                        { id: 'cgrr_1', name: '01. Tờ trình phê duyệt chủ trương', filename: '01_ToTrinhChuTruong.docx' },
                        { id: 'cgrr_2', name: '02. Báo cáo mua sắm dưới chào giá rộng rãi', filename: '02_BaoCaoMuaSam_CGRR.docx' },
                        { id: 'cgrr_3', name: '03. Thông báo mời chào giá', filename: '03_ThongBaoMoiChaoGia.docx' },
                        { id: 'cgrr_4', name: '04. Nội dung đăng báo địa phương', filename: '04_NoiDungDangBao.docx' }
                    ],
                    'Giai đoạn thực hiện': [
                        { id: 'cgrr_5', name: '05. Biên bản mở thư chào giá', filename: '05_BB_MoThuChaoGia.docx' },
                        { id: 'cgrr_6', name: '06. Biên bản đánh giá hồ sơ chào giá', filename: '06_BB_DanhGiaHSCG.docx' },
                        { id: 'cgrr_7', name: '07. Biên bản thương thảo hợp đồng', filename: '07_BB_ThuongThaoHD.docx' },
                        { id: 'cgrr_8', name: '08. Báo cáo đánh giá hồ sơ chào giá', filename: '08_BC_DanhGiaHSCG.docx' },
                        { id: 'cgrr_9', name: '09. Thông báo Kết quả chào giá', filename: '09_TB_KQLCNT.docx' },
                        { id: 'cgrr_10', name: '10. Hợp đồng', filename: '10_HopDong.docx' }
                    ]
                },
                'Chỉ định thầu rút gọn': {
                    'Giai đoạn chuẩn bị': [
                        { id: 'cdtrg_1', name: '01. Tờ trình phê duyệt Kế hoạch LCNT', filename: '01_ToTrinh_KHLCNT.docx' },
                        { id: 'cdtrg_2', name: '02. Quyết định phê duyệt Kế hoạch LCNT', filename: '02_QD_KHLCNT.docx' },
                        { id: 'cdtrg_3', name: '03. Công văn gửi Nhà thầu mời thương thảo', filename: '03_CV_MoiThuongThao.docx' }
                    ],
                    'Giai đoạn thực hiện': [
                        { id: 'cdtrg_4', name: '04. Biên bản thương thảo hợp đồng', filename: '04_BB_ThuongThaoHD.docx' },
                        { id: 'cdtrg_5', name: '05. Thông báo kết quả Chỉ định thầu', filename: '05_TB_KQLCNT.docx' },
                        { id: 'cdtrg_6', name: '06. Hợp đồng', filename: '06_HopDong.docx' }
                    ]
                },
                'Đấu thầu rộng rãi': {
                    'Giai đoạn Chuẩn bị Hồ sơ mời thầu (E-HSMT)': [
                        { id: 'dtrr_1', name: '01. Quyết định thành lập Tổ chuyên gia và Tổ thẩm định', filename: '01_QD_ThanhLapTo.docx' },
                        { id: 'dtrr_2', name: '02. Biên bản họp Tổ chuyên gia (thông qua E-HSMT)', filename: '02_BB_HopTCG.docx' },
                        { id: 'dtrr_3', name: '03. Tờ trình đề nghị thẩm định, phê duyệt E-HSMT', filename: '03_TTr_PheDuyetHSMT.docx' },
                        { id: 'dtrr_4', name: '04. Biên bản họp Tổ thẩm định', filename: '04_BB_HopTTD.docx' },
                        { id: 'dtrr_5', name: '05. Báo cáo thẩm định E-HSMT', filename: '05_BC_ThamDinhHSMT.docx' },
                        { id: 'dtrr_6', name: '06. Quyết định phê duyệt E-HSMT', filename: '06_QD_PheDuyetHSMT.docx' }
                    ],
                    'Giai đoạn Tổ chức Lựa chọn nhà thầu': [
                        { id: 'dtrr_7', name: '07. Thông báo mời thầu (TBMT)', filename: '07_ThongBaoMoiThau.docx' },
                        { id: 'dtrr_8', name: '08. Văn bản làm rõ E-HSMT (nếu có)', filename: '08_VB_LamRoHSMT.docx' },
                        { id: 'dtrr_9', name: '09. Quyết định sửa đổi E-HSMT (nếu có)', filename: '09_QD_SuaDoiHSMT.docx' },
                        { id: 'dtrr_10', name: '10. Biên bản mở thầu', filename: '10_BB_MoThau.docx' }
                    ],
                    'Giai đoạn Đánh giá Hồ sơ dự thầu (E-HSDT)': [
                        { id: 'dtrr_11', name: '11. Biên bản họp Tổ chuyên gia (phân công nhiệm vụ)', filename: '11_BB_HopTCG_PhanCong.docx' },
                        { id: 'dtrr_12', name: '12. Văn bản yêu cầu làm rõ E-HSDT (nếu có)', filename: '12_VB_LamRoHSDT.docx' },
                        { id: 'dtrr_13', name: '13. Biên bản họp Tổ chuyên gia (thông qua kết quả)', filename: '13_BB_HopTCG_KetQua.docx' },
                        { id: 'dtrr_14', name: '14. Báo cáo đánh giá E-HSDT', filename: '14_BC_DanhGiaHSDT.docx' }
                    ],
                    'Giai đoạn Thương thảo và Hoàn thiện hợp đồng': [
                        { id: 'dtrr_15', name: '15. Văn bản mời thương thảo/hoàn thiện hợp đồng', filename: '15_VB_MoiThuongThao.docx' },
                        { id: 'dtrr_16', name: '16. Biên bản thương thảo hợp đồng', filename: '16_BB_ThuongThaoHD.docx' },
                        { id: 'dtrr_17', name: '17. Biên bản hoàn thiện hợp đồng', filename: '17_BB_HoanThienHD.docx' }
                    ],
                    'Giai đoạn Thẩm định và Phê duyệt Kết quả LCNT': [
                        { id: 'dtrr_18', name: '18. Tờ trình đề nghị thẩm định, phê duyệt Kết quả LCNT', filename: '18_TTr_PheDuyetKQLCNT.docx' },
                        { id: 'dtrr_19', name: '19. Biên bản họp Tổ thẩm định', filename: '19_BB_HopTTD_KQLCNT.docx' },
                        { id: 'dtrr_20', name: '20. Báo cáo thẩm định Kết quả LCNT', filename: '20_BC_ThamDinhKQLCNT.docx' },
                        { id: 'dtrr_21', name: '21. Quyết định phê duyệt Kết quả LCNT', filename: '21_QD_PheDuyetKQLCNT.docx' }
                    ],
                    'Giai đoạn Công khai và Ký kết hợp đồng': [
                        { id: 'dtrr_22', name: '22. Thông báo Kết quả LCNT', filename: '22_TB_KQLCNT.docx' },
                        { id: 'dtrr_23', name: '23. Hợp đồng kinh tế', filename: '23_HopDong.docx' }
                    ]
                }
            };

            // Xác định danh sách file hiển thị ở giao diện DỰA VÀO LỰA CHỌN
            const currentFormLogic = logicTree[formData.hinhThucLCNT] || logicTree['Chỉ định thầu rút gọn'];
            const danhSachGiaiDoan = Object.keys(currentFormLogic);
            const currentDocs = currentFormLogic[formData.giaiDoanLCNT] || [];

            // HÀM XỬ LÝ KHI NHẬP/CHỌN DỮ LIỆU THAY ĐỔI
            const handleInputChange = (e) => {
                const { name, value } = e.target;
                
                setFormData(prevData => {
                    const newData = { ...prevData, [name]: value };
                    
                    if (name === 'hinhThucLCNT') {
                        const availablePhases = Object.keys(logicTree[value] || logicTree['Chỉ định thầu rút gọn']);
                        newData.giaiDoanLCNT = availablePhases[0];
                    }
                    
                    return newData;
                });
            };

            const handleNumberChange = (e) => {
                const { name, value } = e.target;
                let rawValue = value.replace(/\D/g, ''); 
                let formattedValue = rawValue.replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
                setFormData({
                    ...formData,
                    [name]: formattedValue
                });
            };

            const handleExportData = () => {
                const dataStr = JSON.stringify(formData, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const fileName = formData.tenGoiThau ? `DuLieu_${formData.tenGoiThau.replace(/\s+/g, '_')}.json` : 'DuLieu_ChuaDatTen.json';
                saveAs(blob, fileName);
            };

            const handleImportData = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        setFormData(prevData => {
                            const updatedData = { ...prevData, ...importedData };
                            if (updatedData.hinhThucLCNT) {
                                const validPhases = Object.keys(logicTree[updatedData.hinhThucLCNT]);
                                if (!validPhases.includes(updatedData.giaiDoanLCNT)) {
                                    updatedData.giaiDoanLCNT = validPhases[0];
                                }
                            }
                            return updatedData;
                        });
                        alert("Đã nhập dữ liệu thành công!");
                    } catch (err) {
                        alert("Lỗi! File không đúng định dạng. Vui lòng chọn file .json bạn đã lưu trước đó.");
                    }
                };
                reader.readAsText(file);
                e.target.value = null; 
            };

            const generateDocument = async () => {
                if (!formData.tenDuAn || !formData.tenGoiThau) {
                    alert("Vui lòng nhập Tên dự án và Tên gói thầu trước khi xuất file!");
                    return;
                }

                setIsGenerating(true);

                try {
                    if (typeof window.JSZip === 'undefined') {
                        throw new Error("Thư viện JSZip chưa tải xong. Vui lòng F5 tải lại trang.");
                    }

                    const currentDocsToGen = currentDocs; 
                    
                    if (currentDocsToGen.length === 0) {
                        throw new Error(`Chưa có biểu mẫu nào được cấu hình cho phần ${formData.hinhThucLCNT} - ${formData.giaiDoanLCNT}.`);
                    }

                    const zipArchive = new window.JSZip();
                    let successCount = 0;
                    
                    for (const docInfo of currentDocsToGen) {
                        try {
                            const response = await fetch('./' + docInfo.filename);
                            if (!response.ok) {
                                console.warn(`Bỏ qua ${docInfo.filename} vì không tìm thấy trên server.`);
                                continue; 
                            }
                            const arrayBuffer = await response.arrayBuffer();
                            const zip = new window.PizZip(arrayBuffer);
                            const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });

                            // TÍNH TOÁN CÁC BIẾN PHÁI SINH
                            const dynamicDates = {};
                            Object.keys(formData).forEach(key => {
                                // Quét toàn bộ dữ liệu, nếu là trường ngày tháng (bắt đầu bằng ngay_) thì sinh ra các biến dịch
                                if (key.startsWith('ngay_')) {
                                    dynamicDates[`${key}Full`] = formatNgay(formData[key], 'full');
                                    dynamicDates[`${key}Short`] = formatNgay(formData[key], 'short');
                                    dynamicDates[`${key}_d`] = formatNgay(formData[key], 'd');
                                    dynamicDates[`${key}_m`] = formatNgay(formData[key], 'm');
                                    dynamicDates[`${key}_y`] = formatNgay(formData[key], 'y');
                                }
                            });

                            const dataToRender = {
                                ...formData,
                                tongMucDauTuBangChu: docTien(formData.tongMucDauTu),
                                soTienDamBaoDuThauBangChu: docTien(formData.soTienDamBaoDuThau), 
                                ...dynamicDates
                            };

                            doc.render(dataToRender); 

                            const docBlob = doc.getZip().generate({
                                type: "blob",
                                mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                            });

                            zipArchive.file(`${docInfo.name}.docx`, docBlob);
                            successCount++;

                        } catch (err) {
                            console.error(`Lỗi khi xử lý file ${docInfo.filename}:`, err);
                        }
                    }

                    if (successCount === 0) {
                        throw new Error("Không thể tạo được file nào. Vui lòng kiểm tra lại xem bạn đã tải các file Word mẫu lên GitHub chưa?");
                    }

                    const content = await zipArchive.generateAsync({ type: "blob" });
                    saveAs(content, `Ho_So_${formData.tenGoiThau.replace(/\s+/g, '_')}_${formData.giaiDoanLCNT.replace(/\s+/g, '')}.zip`);
                    
                } catch (error) {
                    console.error("Lỗi tạo file ZIP:", error);
                    alert("Có lỗi xảy ra: " + error.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto">
                        
                        {/* HEADER MỚI CHUẨN BRANDING ACV CẦN THƠ */}
                        <header className="mb-8 bg-[#00529c] rounded-xl shadow-lg overflow-hidden flex flex-col md:flex-row md:items-end justify-between border-b-[5px] border-[#d4a026]">
                            <div className="p-6 md:pb-6">
                                <h2 className="text-[12px] md:text-[13px] font-medium text-blue-100 mb-1 uppercase tracking-wide">
                                    TCT CẢNG HÀNG KHÔNG VIỆT NAM - CTCP
                                </h2>
                                <h1 className="text-[12.5px] md:text-[14.5px] leading-tight font-bold text-white mb-2 uppercase tracking-tight drop-shadow-sm">
                                    Cảng Hàng không quốc tế Cần Thơ
                                </h1>
                                <div className="inline-block bg-white/20 backdrop-blur-sm px-2.5 py-0.5 rounded text-[12px] md:text-[13px] font-medium text-white border border-white/10 shadow-inner">
                                    Phòng TC-KH | HT AutoDocs Mua sắm
                                </div>
                            </div>
                            
                            <div className="p-6 pt-0 md:pt-6 flex space-x-3">
                                <input 
                                    type="file" 
                                    accept=".json" 
                                    ref={fileInputRef} 
                                    onChange={handleImportData} 
                                    className="hidden" 
                                />
                                <button 
                                    onClick={() => fileInputRef.current.click()}
                                    className="bg-white/10 hover:bg-white/20 text-white border border-white/20 font-medium py-2 px-4 rounded-lg shadow-sm flex items-center transition-all text-sm backdrop-blur-sm"
                                >
                                    <svg className="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                    Nhập dữ liệu
                                </button>
                                <button 
                                    onClick={handleExportData}
                                    className="bg-white text-[#00529c] hover:bg-blue-50 font-bold py-2 px-4 rounded-lg shadow-md flex items-center transition-all text-sm"
                                >
                                    {/* ICON ĐÃ ĐƯỢC THAY ĐỔI: Biểu tượng mũi tên tải xuống (Save/Export) chuẩn */}
